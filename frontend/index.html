          sendChat(`[CONTEXT: Dashboard for ${confirmedTestIds.length} ${mat} ${tt} tests. Test IDs: [${idsCtx}].${statsCtx}\n\nBased on these results, give a 3-4 sentence analysis as a materials engineer would: Are the results consistent? Any outliers or specimens that deviate significantly? Is the standard deviation acceptable? Any trends worth investigating? Use the actual numbers from the card results above. Be specific — name specimen IDs if they stand out. No card_proposals.]`)
            .then(r => setInsights(cleanResponse(r.response)))
            .catch(err => setInsights('Could not generate insights: ' + err.message));
        }, 5000); // Wait 5s for cards to finish loading
      }, [confirmedTestIds, confirmedPreview, cards]);

      const handleUpdateData = useCallback(async () => {
        const mat = confirmedPreview?.rows?.[0]?.material;
        const tt = confirmedPreview?.rows?.[0]?.test_type;
        const cust = confirmedPreview?.rows?.[0]?.customer;
        try {
          const result = await checkForUpdates(confirmedTestIds, mat, tt, cust);
          if (result.new_tests?.length > 0) {
            const newIds = result.new_tests.map(t => t.id);
            const newNames = result.new_tests.map(t => t.name).join(', ');
            const allIds = [...confirmedTestIds, ...newIds];
            const oldCount = confirmedTestIds.length;
            setConfirmedTestIds(allIds);
            setNewTestCount(0);
            setLastUpdated(new Date().toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }));

            // Store old stats for comparison
            const oldStats = {};
            cards.forEach(c => { if (c.stats) oldStats[c.id] = { ...c.stats }; });

            // Re-fetch all existing cards with expanded test set
            for (const card of cards) {
              if (!card.plotData) continue;
              try {
                const chart = await fetchChartData(card.type, card.title, card.metric, allIds);
                setCards(prev => prev.map(c => c.id === card.id ? { ...c, plotData: chart.plotData, stats: chart.stats, subtitle: chart.subtitle } : c));
              } catch {}
            }

            // Generate "What changed?" summary
            const changeMsg = `Dashboard updated: ${newIds.length} new specimen${newIds.length > 1 ? 's' : ''} added (${newNames}). Dataset grew from ${oldCount} → ${allIds.length} tests.`;
            setInsights(changeMsg);

            // Ask AI for deeper change analysis
            sendChat(`[CONTEXT: Dashboard was just updated. ${newIds.length} new tests were added to a ${mat} ${tt} dataset (${oldCount} → ${allIds.length} tests). New specimens: ${newNames}. Give a 2-sentence analysis of what changed — did the mean shift? Are the new specimens consistent with the existing data? Be specific with numbers. No card_proposals.]`)
              .then(r => setInsights(changeMsg + ' ' + cleanResponse(r.response)))
              .catch(() => {});
          }
        } catch {}
      }, [confirmedTestIds, confirmedPreview, cards]);

      // ─── Per-card update: fetch new IDs if needed, refresh single card ───
      const handleUpdateCard = useCallback(async (cardId) => {
        const mat = confirmedPreview?.rows?.[0]?.material;
        const tt = confirmedPreview?.rows?.[0]?.test_type;
        const cust = confirmedPreview?.rows?.[0]?.customer;
        let testIds = confirmedTestIds;
        try {
          // Fetch new test IDs and expand the confirmed set if not yet done
          if (newTestCount > 0) {
            const result = await checkForUpdates(confirmedTestIds, mat, tt, cust);
            if (result.new_tests?.length > 0) {
              const newIds = result.new_tests.map(t => t.id);
              testIds = [...confirmedTestIds, ...newIds];
              setConfirmedTestIds(testIds);
              setConfirmedTotalCount(testIds.length);
            }
          }
          // Refetch just this card
          const card = cards.find(c => c.id === cardId);
          if (card?.plotData) {
            const chart = await fetchChartData(card.type, card.title, card.metric, testIds);
            setCards(prev => prev.map(c => c.id === cardId ? { ...c, plotData: chart.plotData, stats: chart.stats, subtitle: chart.subtitle, hasNewData: false } : c));
          }
          // If all cards are now updated, clear newTestCount
          setCards(prev => {
            const stillPending = prev.some(c => c.id !== cardId && c.hasNewData);
            if (!stillPending) setNewTestCount(0);
            return prev;
          });
        } catch {}
      }, [confirmedTestIds, confirmedPreview, newTestCount, cards]);

      const handleToggleWatch = useCallback((cardId) => {
        setCards(prev => prev.map(c => c.id === cardId ? { ...c, watching: !c.watching } : c));
      }, []);

      const handleClickDataPoint = useCallback((question) => {
        handleChatSend(question);
        setChatExpanded(true);
      }, [handleChatSend]);

      const handleMoveBlock = useCallback((fromIdx, toIdx) => {
        setGridLayout(prev => {
          const next = [...prev];
          [next[fromIdx], next[toIdx]] = [next[toIdx], next[fromIdx]];
          return next;
        });
        setBlockSpans(prev => {
          const next = { ...prev };
          const tmp = next[fromIdx];
          next[fromIdx] = next[toIdx];
          next[toIdx] = tmp;
          return next;
        });
      }, []);

      // ─── Stage transitions ───
      const handleDataConfirmed = async (testIds, preview, mode = 'dashboard') => {
        // Fetch ALL matching test IDs (preview may only have a subset due to limit)
        let allIds = testIds;
        if (preview?.rows?.length > 0) {
          const row = preview.rows[0];
          try {
            const res = await fetch(`${API}/data/all-ids`, { method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ customer: row.customer || null, material: row.material || null, test_type: row.test_type || null }) });
            if (res.ok) {
              const data = await res.json();
              if (data.test_ids?.length > 0) allIds = data.test_ids;
            }
          } catch {}
        }
        setConfirmedTestIds(allIds);
        setConfirmedPreview({ ...preview, total: allIds.length });
        setConfirmedTotalCount(allIds.length);
        setStage(mode === 'chat_only' ? 'chat_only' : 'dashboard');
        setGridLayout([null]);
        setBlockSpans({});
        setCards([]);
        setChatExpanded(false);
        resetChatApi();
        const name = preview?.rows?.[0]?.material || `Dashboard ${sessions.length + 1}`;
        const now = new Date();
        const timeStr = now.toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });

        if (activeSession) {
          // Update existing session (created when user first chatted)
          setSessions(prev => prev.map(s => s.id === activeSession ? {
            ...s, name, testIds: allIds, preview: { ...preview, total: allIds.length }, testCount: allIds.length, createdAt: timeStr,
            savedState: { chatMessages, cards: [], gridLayout: [null], blockSpans: {}, gridCols: 1, insights: null, stage: mode === 'chat_only' ? 'chat_only' : 'dashboard' }
          } : s));
        } else {
          // No session yet — create one
          const sid = crypto.randomUUID();
          setSessions(prev => [{ id: sid, name, testIds: allIds, preview: { ...preview, total: allIds.length }, testCount: allIds.length, createdAt: timeStr, savedState: { chatMessages, cards: [], gridLayout: [null], blockSpans: {}, gridCols: 1, insights: null, stage: mode === 'chat_only' ? 'chat_only' : 'dashboard' } }, ...prev]);
          setActiveSession(sid);
        }
        setLastUpdated(timeStr);
      };

      const handleBack = () => {
        saveCurrentSessionState();
        setStage('select');
        setChatMessages([]);
        setChatExpanded(false);
        resetChatApi();
      };

      // Save current session state into the sessions array
      const saveCurrentSessionState = useCallback(() => {
        if (!activeSession) return;
        // Also save select-stage chats
        if (stage === 'select' && chatMessages.length > 0) {
          setSessions(prev => prev.map(s => s.id === activeSession ? { ...s, savedState: { ...s.savedState, chatMessages, stage } } : s));
          return;
        }
        setSessions(prev => prev.map(s => s.id === activeSession ? {
          ...s, savedState: { cards, gridLayout, blockSpans, chatMessages, gridCols, insights, stage }
        } : s));
      }, [activeSession, cards, gridLayout, blockSpans, chatMessages, gridCols, insights, stage]);

      const handleNewSession = () => {
        saveCurrentSessionState();
        setStage('select');
        setDataPreview(null);
        setChatMessages([]);
        setCards([]);
        setGridLayout([null]);
        setBlockSpans({});
        setChatExpanded(false);
        setChatSuggestions([]);
        setActiveSession(null); // Clear so a new session gets created on first message
        resetChatApi();
      };

      const handleSelectSession = (sid) => {
        const s = sessions.find(x => x.id === sid);
        if (s) {
          saveCurrentSessionState();
          setActiveSession(sid);
          setConfirmedTestIds(s.testIds || []);
          setConfirmedPreview(s.preview || null);
          setDataPreview(s.preview || null);
          // Restore saved state if available
          if (s.savedState) {
            const restoredCards = (s.savedState.cards || []).map(c => ({ ...c, plotData: null, loading: !!c.type && c.type !== 'custom_ai' }));
            setCards(restoredCards);
            setGridLayout(s.savedState.gridLayout || [null]);
            setBlockSpans(s.savedState.blockSpans || {});
            setChatMessages(s.savedState.chatMessages || []);
            setGridCols(s.savedState.gridCols || 2);
            setInsights(s.savedState.insights || null);
            setStage(s.savedState.stage || 'dashboard');
            // Re-fetch chart data for cards that need it
            setTimeout(() => {
              restoredCards.forEach(card => {
                if (card.type && card.type !== 'custom_ai' && !card.aiText) {
                  const extra = {};
                  if (card.spc_mode) extra.spc_mode = card.spc_mode;
                  if (card.ucl != null) extra.ucl = card.ucl;
                  if (card.lcl != null) extra.lcl = card.lcl;
                  fetchChartData(card.type, card.title, card.metric, s.testIds, extra)
                    .then(chart => {
                      if (chart.plotData) setCards(prev => prev.map(c => c.id === card.id ? { ...c, plotData: chart.plotData, stats: chart.stats, subtitle: chart.subtitle, loading: false } : c));
                      else { setCards(prev => prev.filter(c => c.id !== card.id)); setGridLayout(prev => prev.map(slot => slot === card.id ? null : slot)); }
                    })
                    .catch(() => { setCards(prev => prev.filter(c => c.id !== card.id)); setGridLayout(prev => prev.map(slot => slot === card.id ? null : slot)); });
                }
              });
            }, 100);
          } else {
            setCards([]);
            setGridLayout([null]);
            setBlockSpans({});
            setChatMessages([]);
            setStage('dashboard');
          }
          setChatExpanded(false);
          setChatSuggestions([]);
          resetChatApi();
        }
      };

      // ─── Template ───
      const fileInputRef = useRef(null);

      return (
        <div className="h-screen flex flex-col">
          {/* Header */}
          <header className="bg-gray-100 border-b px-4 py-1 flex items-center justify-between flex-shrink-0">
            <div className="flex items-center gap-2">
              <button onClick={() => setSidebarOpen(p => !p)} className="p-1.5 hover:bg-gray-100 rounded-lg text-gray-500 transition-colors" title="Toggle sessions">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
              </button>
              <div className="flex items-baseline gap-0 select-none">

            </div>
            <div className="flex items-center gap-2">
              <input ref={fileInputRef} type="file" accept=".json" className="hidden" onChange={(e) => {
                const file = e.target.files?.[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                  try {
                    const t = JSON.parse(ev.target.result);
                    if (t.cards && t.gridLayout) {
                      setGridLayout(t.gridLayout.map(() => null));
                      t.cards.forEach((c, i) => { if (i < t.gridLayout.length) handleAddCardToBlock(i, c); });
                    } else if (t.cards) {
                      t.cards.forEach((c, i) => handleAddCardToBlock(i, c));
                    }
                  } catch { alert('Invalid template'); }
                };
                reader.readAsText(file); e.target.value = '';
              }} />

                {stage === 'dashboard' && (
                  <>
                    <button onClick={() => {
                      const state = { testIds: confirmedTestIds, preview: confirmedPreview, cards: cards.map(c => ({ type: c.type, title: c.title, metric: c.metric, description: c.description, spc_mode: c.spc_mode })), gridLayout, blockSpans };
                      window.location.hash = btoa(encodeURIComponent(JSON.stringify(state)));
                      navigator.clipboard?.writeText(window.location.href).then(() => {
                        setChatMessages(prev => [...prev, { id: crypto.randomUUID(), role: 'assistant', content: '🔗 Dashboard link copied to clipboard!', ts: new Date() }]);
                      });
                    }} className="px-2 py-1 border border-gray-300 text-gray-600 rounded-lg text-xs hover:bg-gray-100 transition-colors" title="Share dashboard link">
                      🔗 Share
                    </button>
                    <button onClick={() => {
                      const tmpl = JSON.stringify({ cards: cards.map(c => ({ type: c.type, title: c.title, metric: c.metric, description: c.description, spc_mode: c.spc_mode })), gridLayout, blockSpans, gridCols }, null, 2);
                      const blob = new Blob([tmpl], { type: 'application/json' });
                      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `dashboard-${Date.now()}.json`; a.click();
                    }} className="px-2 py-1 border border-gray-300 text-gray-600 rounded-lg text-xs hover:bg-gray-100 transition-colors" title="Save template">
                      💾 Save
                    </button>
                    <button onClick={() => fileInputRef.current?.click()} className="px-2 py-1 border border-gray-300 text-gray-600 rounded-lg text-xs hover:bg-gray-100 transition-colors" title="Load template">
                      📂 Load
                    </button>
                    <button onClick={() => window.print()} className="px-2 py-1 border border-gray-300 text-gray-600 rounded-lg text-xs hover:bg-gray-100 transition-colors" title="Print / PDF export">
                      🖨 Print
                    </button>
                  </>
                )}
                {!chatOpen && <button onClick={() => setChatOpen(true)} className="px-2.5 py-1 border border-zwick-secondary/50 text-zwick-secondary rounded-lg text-xs hover:bg-zwick-secondary/10 transition-colors" title="Open chat">
                  <svg className="w-4 h-4 inline-block mr-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>
                  Chat
                </button>}

          <div className="flex-1 flex overflow-hidden">
            <SessionSidebar sessions={sessions} activeSession={activeSession} onSelect={handleSelectSession} onCreate={handleNewSession} open={sidebarOpen} />
            <div className="flex-1 flex overflow-hidden">
              {stage === 'chat_only' ? (
                /* Chat-only mode: full-width chat with switch button */
                <div className="flex-1 flex flex-col h-full bg-white">
                  <ChatSidebar messages={chatMessages} loading={chatLoading} open={true} fullwidth={true}
                    onToggle={() => {}} onSend={handleChatSend}
                    stage="dashboard" testIds={confirmedTestIds} dataPreview={confirmedPreview}
                    onBack={handleBack} onApproveCards={handleApproveCards} lastUpdated={lastUpdated}
                    suggestions={chatSuggestions} onSwitchMode={() => {
                      // Move inline charts from chat to dashboard cards
                      const inlineCharts = [];
                      chatMessages.forEach(m => {
                        if (m.inlineCharts) m.inlineCharts.forEach(c => inlineCharts.push(c));
                      });
                      if (inlineCharts.length > 0) {
                        const newCards = [];
                        const newLayout = [];
                        inlineCharts.forEach((c, i) => {
                          const cardId = crypto.randomUUID();
                          newCards.push({ id: cardId, type: 'inline', title: c.title, plotData: c.plotData, stats: c.stats, subtitle: c.subtitle, pinned: false, loading: false });
                          newLayout.push(cardId);
                        });
                        setCards(prev => [...prev, ...newCards]);
                        setGridLayout(prev => {
                          const cleaned = prev.filter(s => s !== null);
                          return [...cleaned, ...newLayout, null];
                        });
                      }
                      setStage('dashboard');
                    }}
                    onClear={() => { setChatMessages([]); setChatSuggestions([]); resetChatApi(); }} />
                </div>
              ) : (
                <>
                  <div className="flex-1 flex flex-col overflow-hidden" style={chatOpen && stage === 'dashboard' ? { flex: `0 0 ${chatWidth ? `calc(100% - ${chatWidth}px)` : '50%'}` } : undefined}>
                    {stage === 'select'
                      ? <DataSelectionContent overview={overview} dataPreview={dataPreview} onConfirm={handleDataConfirmed} onDismissPreview={() => setDataPreview(null)} onSuggestionSend={handleChatSend} messages={chatMessages}
                          chatMessages={chatMessages} chatLoading={chatLoading} onChatSend={handleChatSend}
                          chatExpanded={chatExpanded} onToggleChatExpand={() => setChatExpanded(p => !p)}
                          onClearChat={() => { setChatMessages([]); resetChatApi(); }}
                          suggestions={chatSuggestions} />
                      : <DashboardContent cards={cards} gridLayout={gridLayout} blockSpans={blockSpans} testIds={confirmedTestIds} dataPreview={confirmedPreview}
                          onAddCardToBlock={handleAddCardToBlock} onRemoveCard={handleRemoveCard}
                          onTogglePin={(id) => setCards(p => p.map(c => c.id === id ? { ...c, pinned: !c.pinned } : c))}
                          onToggleSpan={(idx) => setBlockSpans(p => ({ ...p, [idx]: (p[idx] || 1) === 1 ? 2 : 1 }))}
                          onAddBlock={() => setGridLayout(p => [...p, null])}
                          onFillCanvas={handleFillCanvas}
                          onMoveBlock={handleMoveBlock}
                          onClickDataPoint={handleClickDataPoint}
                          onUpdateCard={handleUpdateCard}
                          onToggleWatch={handleToggleWatch}
                          insights={insights}
                          onGenerateInsights={generateInsights}
                          gridCols={gridCols}
                          onSetGridCols={setGridCols}
                          savedPrompts={savedPrompts}
                          onRemoveSavedPrompt={removeSavedPrompt}
                          onRefetchSpc={handleRefetchSpc}
                          onRemoveBlock={(idx) => {
                            setGridLayout(prev => prev.filter((_, i) => i !== idx));
                            setBlockSpans(prev => { const n = {...prev}; delete n[idx]; return n; });
                          }} />
                    }
                  </div>
                  {stage === 'dashboard' && chatOpen && (
                    <div className="resize-handle" onMouseDown={(e) => {
                      e.preventDefault();
                      const startX = e.clientX;
                      const startW = chatWidth || (window.innerWidth * 0.5);
                      const handle = e.target;
                      handle.classList.add('active');
                      const onMove = (ev) => {
                        const delta = startX - ev.clientX;
                        setChatWidth(Math.max(280, Math.min(window.innerWidth * 0.7, startW + delta)));
                      };
                      const onUp = () => { handle.classList.remove('active'); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
                      document.addEventListener('mousemove', onMove);
                      document.addEventListener('mouseup', onUp);
                    }} />
                  )}
                  {stage === 'dashboard' && <ChatSidebar messages={chatMessages} loading={chatLoading} open={chatOpen}
                    style={chatOpen ? { width: chatWidth ? `${chatWidth}px` : '50%' } : undefined}
                    onToggle={() => setChatOpen(p => !p)} onSend={handleChatSend}
                    stage={stage} testIds={confirmedTestIds} dataPreview={confirmedPreview}
                    onBack={handleBack} onApproveCards={handleApproveCards} lastUpdated={lastUpdated}
                    suggestions={chatSuggestions} onSavePrompt={savePrompt} savedPrompts={savedPrompts}
                    onSwitchMode={() => setStage('chat_only')}
                    onClear={() => { setChatMessages([]); setChatSuggestions([]); resetChatApi(); }} />}
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
