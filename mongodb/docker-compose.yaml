services:
  mongodb:
    image: mongo:latest
    container_name: mongo-secure
    ports:
      - "8000:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongo-db-data:/data/db
      - ./data:/backups
      - ./ssl:/etc/ssl/mongo:ro
    command:
      - "mongod"
      - "--auth"
      - "--tlsMode"
      - "requireTLS"
      - "--tlsCertificateKeyFile"
      - "/etc/ssl/mongo/mongodb.pem"
      - "--tlsCAFile"
      - "/etc/ssl/mongo/mongodb.crt"
      - "--tlsAllowConnectionsWithoutCertificates"
      - "--maxConns"
      - "10"
    restart: always

volumes:
  mongo-db-data:
